version: "3.9"

services:

  # ─── SERVICE BASE DE DONNÉES ───────────────────────────
  db:
    image: postgres:15
    container_name: crisis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-crisis_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SERVICE API FASTAPI ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisis_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-crisis_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── SERVICE STREAMLIT ────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: crisis_web
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: